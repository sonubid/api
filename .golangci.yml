version: "2"

linters:
  enable:
    - gosec
    - bodyclose
    - noctx
    - unqueryvet
    - revive
    - gocritic
    - misspell
    - whitespace
    - unconvert
    - tagalign
    - predeclared
    - modernize
    - sloglint
    - usestdlibvars
    - perfsprint
    - prealloc
    - errorlint
    - errname
    - nilnil
    - nilerr
    - nestif
    - mnd
    - copyloopvar
    - gocyclo
    - gocognit
    - ireturn
    - iotamixing
    - iface
    - godoclint
    - funcorder
    - embeddedstructfieldcheck
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
