services:
  postgres:
    container_name: sonubid-postgres
    hostname: sonubid-postgres
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonubid -d sonubid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: sonubid-postgres-data

networks:
  default:
    name: sonubid-postgres-network
    driver: bridge
